<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inspire Plugin Tester</title>
    <style>
      :root {
        --bg-a: #0a1026;
        --bg-b: #132033;
        --panel: #142130;
        --ink: #e9f1fa;
        --muted: #95abc0;
        --accent: #22d3ee;
        --ok: #56c271;
        --warn: #f6bb42;
        --danger: #f87171;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
        background: radial-gradient(circle at 15% 15%, #1f3d5a 0, transparent 28%),
          linear-gradient(160deg, var(--bg-a) 0%, var(--bg-b) 60%, #160f2b 100%);
        min-height: 100vh;
      }

      .shell {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }

      h1 {
        margin: 0 0 8px;
        letter-spacing: 0.04em;
        font-size: 28px;
      }

      .subtitle {
        margin: 0 0 20px;
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .card {
        border: 1px solid #36526f;
        background: color-mix(in srgb, var(--panel) 92%, black 8%);
        border-radius: 14px;
        padding: 14px;
      }

      .card h2 {
        margin-top: 0;
      }

      .row {
        display: flex;
        gap: 8px;
        margin-bottom: 8px;
        align-items: center;
      }

      .row label {
        width: 130px;
        color: var(--muted);
        font-size: 13px;
      }

      input {
        width: 100%;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid #3d5a77;
        background: #0b1726;
        color: var(--ink);
      }

      button {
        border: 1px solid #4a6b86;
        border-radius: 8px;
        color: var(--ink);
        background: linear-gradient(180deg, #254665, #1a314a);
        padding: 9px 12px;
        font-weight: 600;
        cursor: pointer;
      }

      button.primary {
        border-color: #38829a;
        background: linear-gradient(180deg, #2f8da8, #266879);
      }

      button.success {
        border-color: #4f8d5a;
        background: linear-gradient(180deg, #66a66f, #4f8657);
      }

      button.warning {
        border-color: #9d7f3f;
        background: linear-gradient(180deg, #be9850, #8d7339);
      }

      button.danger {
        border-color: #9e4f4f;
        background: linear-gradient(180deg, #b96565, #8f4e4e);
      }

      .status {
        margin-top: 8px;
        min-height: 20px;
        font-size: 13px;
        color: var(--muted);
      }

      .status.ok {
        color: var(--ok);
      }

      .status.warn {
        color: var(--warn);
      }

      .status.err {
        color: var(--danger);
      }

      .artifacts {
        margin-top: 12px;
      }

      .artifact {
        border: 1px solid #39536b;
        border-radius: 8px;
        padding: 8px;
        margin-bottom: 8px;
      }

      .badge {
        display: inline-block;
        margin-left: 8px;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        border: 1px solid #4f6c84;
      }

      .badge.ok {
        color: var(--ok);
      }

      .badge.err {
        color: var(--danger);
      }

      #attachDialog {
        position: fixed;
        inset: 0;
        background: rgba(4, 8, 16, 0.64);
        display: none;
        align-items: center;
        justify-content: center;
      }

      #attachDialog.open {
        display: flex;
      }

      .dialog {
        width: min(560px, 92vw);
        background: #0f1d2c;
        border: 1px solid #3b5a78;
        border-radius: 12px;
        padding: 16px;
      }

      .dialog h3 {
        margin-top: 0;
      }

      .home-controls {
        margin-top: 10px;
        border-top: 1px solid #324b61;
        padding-top: 10px;
      }

      @media (max-width: 980px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <h1>Inspire Plugin Tester</h1>
      <p class="subtitle">DAW-style simulator for Master/Relay plugin session flows + Playwright automation.</p>

      <section class="card">
        <h2>Built Plugin Artifacts</h2>
        <div id="artifacts" class="artifacts"></div>
      </section>

      <section class="grid">
        <article class="card">
          <h2>Master Instance</h2>
          <div class="row"><label>Instance ID</label><input id="masterInstanceId" /></div>
          <div class="row"><label>Password</label><input id="masterPassword" value="0000" /></div>
          <div class="row">
            <button id="masterCreateRoom" class="success">Create Room</button>
          </div>
          <div class="row"><label>Room Code</label><input id="masterRoomCode" readonly /></div>
          <div class="status" id="masterStatus"></div>
        </article>

        <article class="card" id="relayHomeCard">
          <h2>Relay Instance</h2>
          <div class="row"><label>Instance ID</label><input id="relayInstanceId" /></div>

          <div class="home-controls" id="relayHomeControls">
            <div class="row"><label>Room Code</label><input id="relayRoomCode" /></div>
            <div class="row"><label>Password</label><input id="relayPassword" value="0000" /></div>
            <div class="row">
              <button id="relayLeaveRoom" class="warning">Leave Room</button>
              <button id="relayUpdates" class="primary">Updates</button>
              <button id="relayCorruptToken" class="danger">Corrupt Token</button>
            </div>
          </div>

          <div class="status" id="relayStatus"></div>
        </article>
      </section>
    </main>

    <section id="attachDialog" aria-hidden="true">
      <div class="dialog">
        <h3>Attach Relay To Master</h3>
        <div class="row"><label>Room Code</label><input id="dialogRoomCode" /></div>
        <div class="row"><label>Password</label><input id="dialogPassword" /></div>
        <div class="row">
          <button id="dialogAttach" class="success">Attach</button>
          <button id="dialogCancel">Cancel</button>
        </div>
        <div class="status" id="dialogStatus"></div>
      </div>
    </section>

    <script type="module" src="/app.js"></script>
  </body>
</html>
